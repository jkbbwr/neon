name: VS Code Extension

# Manual, and separate from the toolchain release: the extension versions on its own clock,
# so shipping a highlighting or language-client fix should not require cutting a compiler
# release. Produces the `.vsix` as an artifact; publishing to the marketplace is not done
# here.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Plain JavaScript (main is client/extension.js), no compile step, no lockfile — so
      # `npm install` (not `npm ci`) and no lockfile-keyed cache. The one runtime dependency
      # (vscode-languageclient) is bundled into the .vsix by vsce.
      - name: Package extension
        working-directory: extra/vscode
        run: |
          set -eux
          npm install
          npx --yes @vscode/vsce package -o "neon-lang.vsix"

      - uses: actions/upload-artifact@v4
        with:
          name: neon-vscode-extension
          path: extra/vscode/neon-lang.vsix
