name: Image

# Manual. Builds the Alpine toolchain image (see Dockerfile) and pushes it to this repo's
# GitHub Container Registry, so `docker run ghcr.io/<owner>/neon` gives a working `neon`
# anywhere a container runs — including Windows via Docker Desktop, and locked-down
# environments where installing a Rust + C toolchain directly is not an option.

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # The image name has to be lowercase; the owner in `github.repository` may not be.
      - name: Compute image tag
        id: tag
        run: echo "ref=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.tag.outputs.ref }}:latest
            ${{ steps.tag.outputs.ref }}:${{ github.sha }}
          # Layer cache in the Actions cache, so an unchanged dependency build is reused.
          cache-from: type=gha
          cache-to: type=gha,mode=max
