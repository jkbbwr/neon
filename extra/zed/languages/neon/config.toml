name = "Neon"
path_suffixes = ["neon"]

# `//` line comments and `///` doc comments (compiler/src/lexer/trivia.rs, TriviaKind).
# The first entry is what `editor: toggle comments` inserts; every entry is used for
# comment continuation on a new line, so `///` blocks continue correctly too.
line_comments = ["// ", "/// "]

# `/* ... */`, and they nest (compiler/src/lexer/mod.rs).
block_comment = { start = "/*", prefix = "", end = "*/", tab_size = 0 }

# `neon fmt` emits four spaces (INDENT in compiler/src/format/mod.rs).
tab_size = 4
hard_tabs = false

autoclose_before = ";:.,=}])>"

brackets = [
    { start = "{", end = "}", close = true, newline = true },
    { start = "[", end = "]", close = true, newline = true },
    { start = "(", end = ")", close = true, newline = true },
    { start = "\"", end = "\"", close = true, newline = false },
]

# No `grammar` key: no Neon tree-sitter grammar is available to this repository.
# Zed's LanguageConfig makes `grammar` optional, so the language registers and
# `neon-lsp` attaches; syntax highlighting is simply absent. See ../../README.md.
