name = "Neon"
path_suffixes = ["neon"]

# `//` line comments and `///` doc comments (compiler/src/lexer/trivia.rs, TriviaKind).
# The first entry is what `editor: toggle comments` inserts; every entry is used for
# comment continuation on a new line, so `///` blocks continue correctly too.
line_comments = ["// ", "/// "]

# `/* ... */`, and they nest (compiler/src/lexer/mod.rs).
block_comment = { start = "/*", prefix = "", end = "*/", tab_size = 0 }

# `neon fmt` emits four spaces (INDENT in compiler/src/format/mod.rs).
tab_size = 4
hard_tabs = false

autoclose_before = ";:.,=}])>"

brackets = [
    { start = "{", end = "}", close = true, newline = true },
    { start = "[", end = "]", close = true, newline = true },
    { start = "(", end = ")", close = true, newline = true },
    { start = "\"", end = "\"", close = true, newline = false },
]

# No `grammar` key -- yet. A Neon grammar exists, in this repository, at
# `extra/tree-sitter-neon`; what is missing is a git URL for Zed to fetch it from,
# because Zed resolves a grammar by `repository` + `rev` and this checkout has no
# remote. The reasoning is spelled out at the bottom of `../../extension.toml`,
# beside the `[grammars.neon]` block that has to be filled in at the same time as
# this line becomes `grammar = "neon"`.
#
# Zed's LanguageConfig makes `grammar` optional, so until then the language
# registers and `neon-lsp` attaches; only tree-sitter features are absent.
# See ../../README.md.
